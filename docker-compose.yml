services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - ./database:/data
    environment:
      - FLASK_DEBUG=1
      - DB_PATH=/data/robot_logger.db
    # restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - ./frontend/docker_entrypoint.sh:/docker_entrypoint.sh:ro
    depends_on:
      - backend
    environment:
      - REACT_APP_LAN_IP=10.0.51.101
    command: ["/bin/sh", "/docker_entrypoint.sh"]

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./frontend/docker_entrypoint_dev.sh:/docker_entrypoint_dev.sh:ro
    depends_on:
      - backend
    command: ["/bin/sh", "/docker_entrypoint_dev.sh"]
